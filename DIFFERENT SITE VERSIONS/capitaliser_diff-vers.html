<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A quick way to turn unicode or other format sub/superscripts into HTML.">

    <meta name="title" content="Capitaliser">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sawyinator.uk/projects/capitaliser/">
    <meta property="og:title" content="Sawyinator.uk">
    <meta property="og:description" content="A quick way to turn unicode or other format sub/superscripts into HTML.">
    <meta property="og:image" content="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23ea580c%22/><g transform=%22scale(2.5) translate(8, 8)%22 stroke=%22white%22 stroke-width=%222%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22m3 15 4-8 4 8%22/><path d=%22M4 13h6%22/><circle cx=%2218%22 cy=%2212%22 r=%223%22/><path d=%22M21 9v6%22/></g></svg>">
    <meta name="theme-color" content="#ea580c">

    <title>Capitaliser</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23ea580c%22/><g transform=%22scale(2.5) translate(8, 8)%22 stroke=%22white%22 stroke-width=%222%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22m3 15 4-8 4 8%22/><path d=%22M4 13h6%22/><circle cx=%2218%22 cy=%2212%22 r=%223%22/><path d=%22M21 9v6%22/></g></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind for class-based dark mode
        tailwind.config = {
            darkMode: 'class'
        }

        // Immediate check to prevent theme flickering
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.3 !important;
        }
    </style>
</head>

<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen p-8 pt-16">
    <a href="/" class="fixed top-4 left-4 flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors z-50">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Back to main website
    </a>

    <div class="max-w-3xl mx-auto">
        <header class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold tracking-tight">Capital<span class="text-orange-600">iser</span></h1>
            </div>

            <button id="theme-toggle" class="p-2 rounded-xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 transition-all group">
                <i data-lucide="sun" class="hidden dark:block w-5 h-5 text-zinc-400 dark:text-orange-500 group-hover:text-orange-600 transition-colors"></i>
                <i data-lucide="moon" class="block dark:hidden w-5 h-5 text-zinc-500 group-hover:text-orange-600 transition-colors"></i>
            </button>

        </header>

        <div class="grid gap-6">
            <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800 overflow-hidden focus-within:border-orange-500 transition-all">
                <div class="flex items-center justify-between p-3 bg-zinc-50 dark:bg-zinc-800/50 border-b border-zinc-200 dark:border-zinc-800">
                    <div class="flex items-center gap-4">
                        <label class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">Input Text</label>
                    </div>
                    <div class="flex items-center gap-1">
                        <button id="clear-btn-input" class="px-3 py-1.5 text-zinc-600 dark:text-zinc-400 hover:text-orange-700 dark:hover:text-orange-300 hover:bg-orange-100 dark:hover:bg-orange-900/30 rounded-lg text-xs font-bold transition-all flex items-center gap-2" title="Clear Text">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            Clear
                        </button>
                        <button id="reset-size-btn-input" class="px-3 py-1.5 text-zinc-600 dark:text-zinc-400 hover:text-orange-700 dark:hover:text-orange-300 hover:bg-orange-100 dark:hover:bg-orange-900/30 rounded-lg text-xs font-bold transition-all flex items-center gap-2" title="Reset Textbox Size">
                            <i data-lucide="maximize-2" class="w-3.5 h-3.5"></i>
                            Reset Size
                        </button>
                        <div class="w-px h-4 bg-zinc-300 dark:bg-zinc-700 mx-1"></div>
                        <button id="undo-btn" class="p-2 text-zinc-500 hover:text-orange-600 hover:bg-orange-50 dark:hover:bg-orange-900/20 rounded-lg transition-all" title="Undo (Ctrl+Z)">
                            <i data-lucide="undo-2" class="w-4 h-4"></i>
                        </button>
                        <button id="redo-btn" class="p-2 text-zinc-500 hover:text-orange-600 hover:bg-orange-50 dark:hover:bg-orange-900/20 rounded-lg transition-all" title="Redo (Ctrl+Y)">
                            <i data-lucide="redo-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <textarea id="input-text" placeholder="Type or paste your text here..." class="w-full h-80 p-4 bg-white dark:bg-zinc-900 text-sm outline-none transition-all resize-y font-mono border-none text-zinc-900 dark:text-zinc-100"></textarea>
            </div>

            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="transform('title')" class="px-4 py-2 bg-white dark:bg-zinc-900 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">Title Case</button>
                <button onclick="transform('sentence')" class="px-4 py-2 bg-white dark:bg-zinc-900 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">Sentence case</button>
                <button onclick="transform('upper')" class="px-4 py-2 bg-white dark:bg-zinc-900 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">UPPERCASE</button>
                <button onclick="transform('lower')" class="px-4 py-2 bg-white dark:bg-zinc-900 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">lowercase</button>
                <button onclick="transform('first')" class="px-4 py-2 bg-white dark:bg-zinc-900 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">First Letter</button>
                <button onclick="transform('toggle')" class="px-4 py-2 bg-white dark:bg-zinc-900 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">tOGGLE</button>
            </div>

            <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">Output Text</label>
                        <div id="change-warning" class="flex items-center gap-1.5 text-[11px] font-medium text-zinc-400 hidden">
                            <i data-lucide="info" class="w-3.5 h-3.5"></i>
                            <span>The input has changed. Please choose a capitalisation method again to update the output.</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="copy-btn" onclick="copyOutput()" class="flex items-center gap-2 text-xs font-bold text-orange-600 hover:text-orange-700 transition-colors">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                            Copy Text
                        </button>
                    </div>
                </div>
                <textarea id="output-text" readonly placeholder="Transformed text will appear here..." class="w-full h-40 p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl text-sm outline-none resize-none overflow-hidden dark:text-zinc-200"></textarea>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('input-text');
        const output = document.getElementById('output-text');
        const copyBtn = document.getElementById('copy-btn');
        const warning = document.getElementById('change-warning');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const clearBtnInput = document.getElementById('clear-btn-input');
        const resetSizeBtnInput = document.getElementById('reset-size-btn-input');
        
        const INPUT_STORAGE_KEY = 'capitaliser_input_height';

        // Load saved heights
        const savedInputHeight = localStorage.getItem(INPUT_STORAGE_KEY);
        if (savedInputHeight) {
            input.style.height = savedInputHeight + 'px';
        }

        // Save heights on resize
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                if (entry.target === input) {
                    localStorage.setItem(INPUT_STORAGE_KEY, input.offsetHeight);
                }
            }
        });
        resizeObserver.observe(input);

        resetSizeBtnInput.addEventListener('click', () => {
            input.style.height = '';
            localStorage.removeItem(INPUT_STORAGE_KEY);
        });

        function adjustOutputHeight() {
            output.style.height = 'auto';
            output.style.height = output.scrollHeight + 'px';
        }

        // Theme Handling logic
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        function transform(type) {
            const text = input.value;
            if (!text) return;

            warning.classList.add('hidden');
            let result = '';

            switch (type) {
                case 'upper':
                    result = text.toUpperCase();
                    break;
                case 'lower':
                    result = text.toLowerCase();
                    break;
                case 'title':
                    const minorWords = ['a', 'an', 'the', 'and', 'but', 'for', 'or', 'nor', 'at', 'by', 'from', 'in', 'into', 'of', 'off', 'on', 'onto', 'out', 'over', 'to', 'up', 'with', 'as'];
                    const parts = text.toLowerCase().split(/(\s+)/);
                    const wordsOnly = parts.filter((p, i) => i % 2 === 0 && p.length > 0);
                    let wordIndex = 0;
                    result = parts.map((part, i) => {
                        if (i % 2 !== 0 || part.length === 0) return part;

                        const isFirst = wordIndex === 0;
                        const isLast = wordIndex === wordsOnly.length - 1;
                        wordIndex++;

                        if (!isFirst && !isLast && minorWords.includes(part)) {
                            return part;
                        }
                        return part.charAt(0).toUpperCase() + part.slice(1);
                    }).join('');
                    break;
                case 'sentence':
                    result = text.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w|\n\s*\w)/g, c => c.toUpperCase());
                    break;
                case 'first':
                    result = text.toLowerCase().split(/(\s+)/).map(part => {
                        if (part.length === 0 || /^\s+$/.test(part)) return part;
                        return part.charAt(0).toUpperCase() + part.slice(1);
                    }).join('');
                    break;
                case 'toggle':
                    result = text.split('').map(char => {
                        if (char === char.toUpperCase()) return char.toLowerCase();
                        return char.toUpperCase();
                    }).join('');
                    break;
            }

            output.value = result;
            adjustOutputHeight();
        }

        input.addEventListener('input', () => {
            if (output.value) {
                warning.classList.remove('hidden');
            }
            updateUndoRedoState();
        });

        undoBtn.addEventListener('click', () => {
            input.focus();
            document.execCommand('undo');
            updateUndoRedoState();
        });

        redoBtn.addEventListener('click', () => {
            input.focus();
            document.execCommand('redo');
            updateUndoRedoState();
        });

        clearBtnInput.addEventListener('click', () => {
            input.value = '';
            output.value = '';
            adjustOutputHeight();
            warning.classList.add('hidden');
            input.focus();
            updateUndoRedoState();
        });

        function updateUndoRedoState() {
            setTimeout(() => {
                undoBtn.disabled = !document.queryCommandEnabled('undo');
                redoBtn.disabled = !document.queryCommandEnabled('redo');
            }, 0);
        }

        input.addEventListener('focus', updateUndoRedoState);
        input.addEventListener('mouseup', updateUndoRedoState);
        input.addEventListener('keyup', updateUndoRedoState);

        async function copyOutput() {
            if (!output.value) return;

            try {
                await navigator.clipboard.writeText(output.value);
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!';
                lucide.createIcons();
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        lucide.createIcons();
        updateUndoRedoState();
    </script>
</body>

</html>

<html lang="en"> <head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind for class-based dark mode
        tailwind.config = {
            darkMode: 'class'
        }

        // Immediate check to prevent theme flickering
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen p-8 pt-16 transition-colors duration-200">
    <a href="/" class="fixed top-4 left-4 flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors z-50">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Back to main website
    </a>

    <div class="max-w-3xl mx-auto">
        <header class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold tracking-tight">Sub & Sup <span class="text-purple-600 dark:text-purple-400">to HTML</span></h1>
            </div>
            <button id="theme-toggle" class="p-2 rounded-xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-purple-500 transition-all group">
                <i data-lucide="sun" class="hidden dark:block w-5 h-5 text-zinc-400 dark:text-purple-400 group-hover:text-purple-500 transition-colors"></i>
                <i data-lucide="moon" class="block dark:hidden w-5 h-5 text-zinc-500 group-hover:text-purple-600 transition-colors"></i>
            </button>
        </header>

        <div class="grid gap-6">
            <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800 overflow-hidden focus-within:border-purple-500 transition-all">
                <div class="flex items-center justify-between p-3 bg-zinc-50 dark:bg-zinc-800/50 border-b border-zinc-200 dark:border-zinc-800">
                    <div class="flex items-center gap-4">
                        <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Input Box</label>
                        <div class="w-px h-4 bg-zinc-300 dark:bg-zinc-700"></div>
                        <div class="flex items-center gap-1">
                            <button id="sup-btn" class="px-3 py-1.5 text-zinc-600 dark:text-zinc-400 hover:text-purple-700 dark:hover:text-purple-300 hover:bg-purple-100 dark:hover:bg-purple-900/30 rounded-lg text-xs font-bold transition-all flex items-center gap-2" title="Superscript (Alt+1)">
                                <i data-lucide="chevrons-up" class="w-3.5 h-3.5"></i>
                                Superscript <span class="text-[10px] opacity-50 font-mono ml-1">Alt+1</span>
                            </button>
                            <button id="sub-btn" class="px-3 py-1.5 text-zinc-600 dark:text-zinc-400 hover:text-purple-700 dark:hover:text-purple-300 hover:bg-purple-100 dark:hover:bg-purple-900/30 rounded-lg text-xs font-bold transition-all flex items-center gap-2" title="Subscript (Alt+2)">
                                <i data-lucide="chevrons-down" class="w-3.5 h-3.5"></i>
                                Subscript <span class="text-[10px] opacity-50 font-mono ml-1">Alt+2</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button id="reset-size-btn" class="px-3 py-1.5 text-zinc-600 dark:text-zinc-400 hover:text-purple-700 dark:hover:text-purple-300 hover:bg-purple-100 dark:hover:bg-purple-900/30 rounded-lg text-xs font-bold transition-all flex items-center gap-2" title="Reset Textbox Size">
                            <i data-lucide="maximize-2" class="w-3.5 h-3.5"></i>
                            Reset Size
                        </button>
                        <div class="w-px h-4 bg-zinc-300 dark:bg-zinc-700 mx-1"></div>
                        <button id="undo-btn" class="p-2 text-zinc-500 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/20 rounded-lg transition-all" title="Undo (Ctrl+Z)">
                            <i data-lucide="undo-2" class="w-4 h-4"></i>
                        </button>
                        <button id="redo-btn" class="p-2 text-zinc-500 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/20 rounded-lg transition-all" title="Redo (Ctrl+Y)">
                            <i data-lucide="redo-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <textarea id="input-text" placeholder="Type text here, highlight parts, and use buttons, or paste unicode (₀₁₂ / ⁰¹²)..." 
                    class="w-full h-80 p-4 bg-white dark:bg-zinc-900 text-sm outline-none transition-all resize-y font-mono border-none text-zinc-900 dark:text-zinc-100"></textarea>
            </div>

            <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800">
                <div class="flex items-center justify-between mb-3">
                    <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest">HTML Output</label>
                    <button id="copy-btn" class="flex items-center gap-2 text-xs font-bold text-purple-600 dark:text-purple-400 hover:text-purple-700 transition-colors">
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        Copy HTML
                    </button>
                </div>
                <div id="output-html" class="w-full min-h-[100px] p-4 bg-black text-zinc-300 rounded-xl text-sm font-mono break-all whitespace-pre-wrap"></div>
            </div>

            <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800">
                <div class="flex items-center justify-between mb-3">
                    <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest">Rendered Preview</label>
                    <label class="flex items-center cursor-pointer gap-2">
                        <span class="text-xs font-medium text-zinc-500">Linebreaks to br</span>
                        <div class="relative inline-block w-8 h-4 transition duration-200 ease-in-out bg-zinc-200 dark:bg-zinc-700 rounded-full">
                            <input type="checkbox" id="linebreaks-toggle" checked class="absolute w-4 h-4 transition duration-200 ease-in-out transform bg-white border-2 border-zinc-200 dark:border-zinc-600 rounded-full appearance-none cursor-pointer checked:translate-x-4 checked:bg-purple-600 checked:border-purple-600">
                        </div>
                    </label>
                </div>
                <div id="preview-render" class="w-full p-4 bg-zinc-50 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-xl text-lg min-h-[60px] whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Theme Toggle Logic ---
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // --- Rest of your original JavaScript (Unchanged) ---
        const input = document.getElementById('input-text');
        const output = document.getElementById('output-html');
        const preview = document.getElementById('preview-render');
        const copyBtn = document.getElementById('copy-btn');
        const supBtn = document.getElementById('sup-btn');
        const subBtn = document.getElementById('sub-btn');
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const linebreaksToggle = document.getElementById('linebreaks-toggle');
        const resetSizeBtn = document.getElementById('reset-size-btn');

        const STORAGE_KEY = 'subsup_input_height';

        // Load saved height
        const savedHeight = localStorage.getItem(STORAGE_KEY);
        if (savedHeight) {
            input.style.height = savedHeight + 'px';
        }

        // Save height on resize
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                if (entry.target === input) {
                    localStorage.setItem(STORAGE_KEY, input.offsetHeight);
                }
            }
        });
        resizeObserver.observe(input);

        resetSizeBtn.addEventListener('click', () => {
            input.style.height = '';
            localStorage.removeItem(STORAGE_KEY);
        });

        linebreaksToggle.addEventListener('change', () => {
            if (linebreaksToggle.checked) {
                preview.classList.add('whitespace-pre-wrap');
            } else {
                preview.classList.remove('whitespace-pre-wrap');
            }
        });

        const supMap = {
            '⁰': '0', '¹': '1', '²': '2', '³': '3', '⁴': '4', '⁵': '5', '⁶': '6', '⁷': '7', '⁸': '8', '⁹': '9',
            '⁺': '+', '⁻': '-', '⁼': '=', '⁽': '(', '⁾': ')', 'ᵃ': 'a', 'ᵇ': 'b', 'ᶜ': 'c', 'ᵈ': 'd', 'ᵉ': 'e',
            'ᶠ': 'f', 'ᵍ': 'g', 'ʰ': 'h', 'ⁱ': 'i', 'ʲ': 'j', 'ᵏ': 'k', 'ˡ': 'l', 'ᵐ': 'm', 'ⁿ': 'n', 'ᵒ': 'o',
            'ᵖ': 'p', 'ʳ': 'r', 'ˢ': 's', 'ᵗ': 't', 'ᵘ': 'u', 'ᵛ': 'v', 'ʷ': 'w', 'ˣ': 'x', 'ʸ': 'y', 'ᶻ': 'z'
        };

        const subMap = {
            '₀': '0', '₁': '1', '₂': '2', '₃': '3', '₄': '4', '₅': '5', '₆': '6', '₇': '7', '₈': '8', '₉': '9',
            '₊': '+', '₋': '-', '₌': '=', '₍': '(', '₎': ')', 'ₐ': 'a', 'ₑ': 'e', 'ₕ': 'h', 'ᵢ': 'i', 'ⱼ': 'j',
            'ₖ': 'k', 'ₗ': 'l', 'ₘ': 'm', 'ₙ': 'n', 'ₒ': 'o', 'ₚ': 'p', 'ᵣ': 'r', 'ₛ': 's', 'ₜ': 't', 'ᵤ': 'u',
            'ᵥ': 'v', 'ₓ': 'x'
        };

        function wrapSelection(tag) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            const selectedText = text.substring(start, end);
            
            if (selectedText.length === 0) return;

            const scrollTop = input.scrollTop;
            const replacement = `<${tag}>${selectedText}</${tag}>`;
            
            input.focus();
            input.setSelectionRange(start, end);
            document.execCommand('insertText', false, replacement);
            
            setTimeout(() => {
                input.scrollTop = scrollTop;
                updateUndoRedoState();
            }, 0);
        }

        supBtn.addEventListener('click', () => wrapSelection('sup'));
        subBtn.addEventListener('click', () => wrapSelection('sub'));
        undoBtn.addEventListener('click', () => {
            input.focus();
            document.execCommand('undo');
            updateUndoRedoState();
        });
        redoBtn.addEventListener('click', () => {
            input.focus();
            document.execCommand('redo');
            updateUndoRedoState();
        });

        function convert(text) {
            let result = '';
            let i = 0;
            while (i < text.length) {
                const char = text[i];
                if (supMap[char]) {
                    let supText = '';
                    while (i < text.length && supMap[text[i]]) {
                        supText += supMap[text[i]];
                        i++;
                    }
                    result += `<sup>${supText}</sup>`;
                } else if (subMap[char]) {
                    let subText = '';
                    while (i < text.length && subMap[text[i]]) {
                        subText += subMap[text[i]];
                        i++;
                    }
                    result += `<sub>${subText}</sub>`;
                } else {
                    result += char;
                    i++;
                }
            }
            return result;
        }

        input.addEventListener('keydown', (e) => {
            if (e.altKey) {
                if (e.key === '1') {
                    e.preventDefault();
                    wrapSelection('sup');
                } else if (e.key === '2') {
                    e.preventDefault();
                    wrapSelection('sub');
                }
            }
        });

        input.addEventListener('paste', (e) => {
            const html = e.clipboardData.getData('text/html');
            if (html) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const hasSubSup = doc.querySelector('sub, sup') || 
                                 Array.from(doc.querySelectorAll('*')).some(el => {
                                     const styleAttr = el.getAttribute('style') || '';
                                     const style = el.style || {};
                                     const lowerStyle = styleAttr.toLowerCase();
                                     return style.verticalAlign === 'sub' || 
                                            style.verticalAlign === 'super' ||
                                            lowerStyle.includes('vertical-align:sub') ||
                                            lowerStyle.includes('vertical-align:super');
                                 });

                if (hasSubSup) {
                    e.preventDefault();
                    function processNode(node) {
                        let text = '';
                        node.childNodes.forEach(child => {
                            if (child.nodeType === Node.TEXT_NODE) {
                                text += child.textContent;
                            } else if (child.nodeType === Node.ELEMENT_NODE) {
                                const tagName = child.tagName.toLowerCase();
                                const styleAttr = child.getAttribute('style') || '';
                                const style = child.style || {};
                                const lowerStyle = styleAttr.toLowerCase();
                                
                                const isSup = tagName === 'sup' || style.verticalAlign === 'super' || lowerStyle.includes('vertical-align:super');
                                const isSub = tagName === 'sub' || style.verticalAlign === 'sub' || lowerStyle.includes('vertical-align:sub');
                                
                                if (isSup) {
                                    text += `<sup>${processNode(child)}</sup>`;
                                } else if (isSub) {
                                    text += `<sub>${processNode(child)}</sub>`;
                                } else if (tagName === 'br') {
                                    text += '\n';
                                } else {
                                    text += processNode(child);
                                }
                            }
                        });
                        return text;
                    }

                    const processedText = processNode(doc.body);
                    document.execCommand('insertText', false, processedText);
                }
            }
        });

        input.addEventListener('input', () => {
            const converted = convert(input.value);
            output.textContent = converted;
            preview.innerHTML = converted;
            updateUndoRedoState();
        });

        function updateUndoRedoState() {
            setTimeout(() => {
                undoBtn.disabled = !document.queryCommandEnabled('undo');
                redoBtn.disabled = !document.queryCommandEnabled('redo');
            }, 0);
        }

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(output.textContent);
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!';
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        });

        lucide.createIcons();
        updateUndoRedoState();
    </script>
</body>

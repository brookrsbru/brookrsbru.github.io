<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub and Sup to HTML</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%239333ea%22/><g transform=%22scale(2.5) translate(8, 8)%22 stroke=%22white%22 stroke-width=%222%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22M17 6.1H3%22/><path d=%22M21 12.1H3%22/><path d=%22M15.1 18H3%22/></g></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.3 !important;
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="p-2 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 rounded-lg transition-colors">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </a>
                <h1 class="text-2xl font-bold tracking-tight">Sub & Sup <span class="text-purple-600">to HTML</span></h1>
            </div>
        </header>

        <div class="grid gap-6">
            <!-- Input Area -->
            <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden focus-within:border-purple-500 transition-all">
                <div class="flex items-center justify-between p-3 bg-zinc-50 border-b border-zinc-200">
                    <div class="flex items-center gap-4">
                        <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Input Box</label>
                        <div class="w-px h-4 bg-zinc-300"></div>
                        <div class="flex items-center gap-1">
                            <button id="sup-btn" class="px-3 py-1.5 text-zinc-600 hover:text-purple-700 hover:bg-purple-100 rounded-lg text-xs font-bold transition-all flex items-center gap-2" title="Superscript (Alt+1)">
                                <i data-lucide="chevrons-up" class="w-3.5 h-3.5"></i>
                                Superscript <span class="text-[10px] opacity-50 font-mono ml-1">Alt+1</span>
                            </button>
                            <button id="sub-btn" class="px-3 py-1.5 text-zinc-600 hover:text-purple-700 hover:bg-purple-100 rounded-lg text-xs font-bold transition-all flex items-center gap-2" title="Subscript (Alt+2)">
                                <i data-lucide="chevrons-down" class="w-3.5 h-3.5"></i>
                                Subscript <span class="text-[10px] opacity-50 font-mono ml-1">Alt+2</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button id="undo-btn" class="p-2 text-zinc-500 hover:text-purple-600 hover:bg-purple-50 rounded-lg transition-all" title="Undo (Ctrl+Z)">
                            <i data-lucide="undo-2" class="w-4 h-4"></i>
                        </button>
                        <button id="redo-btn" class="p-2 text-zinc-500 hover:text-purple-600 hover:bg-purple-50 rounded-lg transition-all" title="Redo (Ctrl+Y)">
                            <i data-lucide="redo-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <textarea id="input-text" placeholder="Type text here, highlight parts, and use buttons, or paste unicode (₀₁₂ / ⁰¹²)..." 
                    class="w-full h-80 p-4 bg-white text-sm outline-none transition-all resize-none font-mono border-none"></textarea>
            </div>

            <!-- Output Area -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                <div class="flex items-center justify-between mb-3">
                    <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest">HTML Output</label>
                    <button id="copy-btn" class="flex items-center gap-2 text-xs font-bold text-purple-600 hover:text-purple-700 transition-colors">
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        Copy HTML
                    </button>
                </div>
                <div id="output-html" class="w-full min-h-[100px] p-4 bg-zinc-900 text-zinc-300 rounded-xl text-sm font-mono break-all whitespace-pre-wrap"></div>
            </div>

            <!-- Preview Area -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                <div class="flex items-center justify-between mb-3">
                    <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest">Rendered Preview</label>
                    <label class="flex items-center cursor-pointer gap-2">
                        <span class="text-xs font-medium text-zinc-500">Linebreaks to br</span>
                        <div class="relative inline-block w-8 h-4 transition duration-200 ease-in-out bg-zinc-200 rounded-full">
                            <input type="checkbox" id="linebreaks-toggle" checked class="absolute w-4 h-4 transition duration-200 ease-in-out transform bg-white border-2 border-zinc-200 rounded-full appearance-none cursor-pointer checked:translate-x-4 checked:bg-purple-600 checked:border-purple-600">
                        </div>
                    </label>
                </div>
                <div id="preview-render" class="w-full p-4 bg-zinc-50 border border-zinc-200 rounded-xl text-lg min-h-[60px] whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('input-text');
        const output = document.getElementById('output-html');
        const preview = document.getElementById('preview-render');
        const copyBtn = document.getElementById('copy-btn');
        const supBtn = document.getElementById('sup-btn');
        const subBtn = document.getElementById('sub-btn');
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const linebreaksToggle = document.getElementById('linebreaks-toggle');

        linebreaksToggle.addEventListener('change', () => {
            if (linebreaksToggle.checked) {
                preview.classList.add('whitespace-pre-wrap');
            } else {
                preview.classList.remove('whitespace-pre-wrap');
            }
        });

        const supMap = {
            '⁰': '0', '¹': '1', '²': '2', '³': '3', '⁴': '4', '⁵': '5', '⁶': '6', '⁷': '7', '⁸': '8', '⁹': '9',
            '⁺': '+', '⁻': '-', '⁼': '=', '⁽': '(', '⁾': ')', 'ᵃ': 'a', 'ᵇ': 'b', 'ᶜ': 'c', 'ᵈ': 'd', 'ᵉ': 'e',
            'ᶠ': 'f', 'ᵍ': 'g', 'ʰ': 'h', 'ⁱ': 'i', 'ʲ': 'j', 'ᵏ': 'k', 'ˡ': 'l', 'ᵐ': 'm', 'ⁿ': 'n', 'ᵒ': 'o',
            'ᵖ': 'p', 'ʳ': 'r', 'ˢ': 's', 'ᵗ': 't', 'ᵘ': 'u', 'ᵛ': 'v', 'ʷ': 'w', 'ˣ': 'x', 'ʸ': 'y', 'ᶻ': 'z'
        };

        const subMap = {
            '₀': '0', '₁': '1', '₂': '2', '₃': '3', '₄': '4', '₅': '5', '₆': '6', '₇': '7', '₈': '8', '₉': '9',
            '₊': '+', '₋': '-', '₌': '=', '₍': '(', '₎': ')', 'ₐ': 'a', 'ₑ': 'e', 'ₕ': 'h', 'ᵢ': 'i', 'ⱼ': 'j',
            'ₖ': 'k', 'ₗ': 'l', 'ₘ': 'm', 'ₙ': 'n', 'ₒ': 'o', 'ₚ': 'p', 'ᵣ': 'r', 'ₛ': 's', 'ₜ': 't', 'ᵤ': 'u',
            'ᵥ': 'v', 'ₓ': 'x'
        };

        function wrapSelection(tag) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            const selectedText = text.substring(start, end);
            
            if (selectedText.length === 0) return;

            // Save scroll position
            const scrollTop = input.scrollTop;

            const replacement = `<${tag}>${selectedText}</${tag}>`;
            
            // Focus and select the range to ensure execCommand targets the correct area
            input.focus();
            input.setSelectionRange(start, end);
            
            // Use insertText to ensure it's added to the native undo stack
            document.execCommand('insertText', false, replacement);
            
            // Restore scroll position after a tiny delay to override any browser auto-scrolling
            // triggered by the focus or selection change
            setTimeout(() => {
                input.scrollTop = scrollTop;
                updateUndoRedoState();
            }, 0);
        }

        supBtn.addEventListener('click', () => wrapSelection('sup'));
        subBtn.addEventListener('click', () => wrapSelection('sub'));
        undoBtn.addEventListener('click', () => {
            input.focus();
            document.execCommand('undo');
            updateUndoRedoState();
        });
        redoBtn.addEventListener('click', () => {
            input.focus();
            document.execCommand('redo');
            updateUndoRedoState();
        });

        function convert(text) {
            let result = '';
            let i = 0;
            while (i < text.length) {
                const char = text[i];
                if (supMap[char]) {
                    let supText = '';
                    while (i < text.length && supMap[text[i]]) {
                        supText += supMap[text[i]];
                        i++;
                    }
                    result += `<sup>${supText}</sup>`;
                } else if (subMap[char]) {
                    let subText = '';
                    while (i < text.length && subMap[text[i]]) {
                        subText += subMap[text[i]];
                        i++;
                    }
                    result += `<sub>${subText}</sub>`;
                } else {
                    result += char;
                    i++;
                }
            }
            return result;
        }

        input.addEventListener('keydown', (e) => {
            if (e.altKey) {
                if (e.key === '1') {
                    e.preventDefault();
                    wrapSelection('sup');
                } else if (e.key === '2') {
                    e.preventDefault();
                    wrapSelection('sub');
                }
            }
        });

        input.addEventListener('input', () => {
            const converted = convert(input.value);
            output.textContent = converted;
            preview.innerHTML = converted;
            updateUndoRedoState();
        });

        // Update undo/redo state on focus and selection change
        input.addEventListener('focus', updateUndoRedoState);
        input.addEventListener('mouseup', updateUndoRedoState);
        input.addEventListener('keyup', updateUndoRedoState);

        function updateUndoRedoState() {
            // Small timeout to allow the browser to update its internal state
            setTimeout(() => {
                undoBtn.disabled = !document.queryCommandEnabled('undo');
                redoBtn.disabled = !document.queryCommandEnabled('redo');
            }, 0);
        }

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(output.textContent);
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!';
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        });

        lucide.createIcons();
        updateUndoRedoState();
    </script>
</body>
</html>

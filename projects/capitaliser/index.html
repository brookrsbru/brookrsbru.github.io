<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitaliser</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23ea580c%22/><g transform=%22scale(2.5) translate(8, 8)%22 stroke=%22white%22 stroke-width=%222%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22m3 15 4-8 4 8%22/><path d=%22M4 13h6%22/><circle cx=%2218%22 cy=%2212%22 r=%223%22/><path d=%22M21 9v6%22/></g></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="p-2 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 rounded-lg transition-colors">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </a>
                <h1 class="text-2xl font-bold tracking-tight">Capital<span class="text-orange-600">iser</span></h1>
            </div>
        </header>

        <div class="grid gap-6">
            <!-- Input Area -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest mb-3">Input Text</label>
                <textarea id="input-text" placeholder="Type or paste your text here..." 
                    class="w-full h-40 p-4 bg-zinc-50 border border-zinc-200 rounded-xl text-sm outline-none focus:border-orange-500 transition-all resize-none"></textarea>
            </div>

            <!-- Transformation Options -->
            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="transform('title')" class="px-4 py-2 bg-white border border-zinc-200 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">Title Case</button>
                <button onclick="transform('sentence')" class="px-4 py-2 bg-white border border-zinc-200 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">Sentence case</button>
                <button onclick="transform('upper')" class="px-4 py-2 bg-white border border-zinc-200 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">UPPERCASE</button>
                <button onclick="transform('lower')" class="px-4 py-2 bg-white border border-zinc-200 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">lowercase</button>
                <button onclick="transform('first')" class="px-4 py-2 bg-white border border-zinc-200 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">First Letter</button>
                <button onclick="transform('toggle')" class="px-4 py-2 bg-white border border-zinc-200 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all">tOGGLE</button>
            </div>

            <!-- Output Area -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                <div class="flex items-center justify-between mb-3">
                    <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest">Output Text</label>
                    <button id="copy-btn" onclick="copyOutput()" class="flex items-center gap-2 text-xs font-bold text-orange-600 hover:text-orange-700 transition-colors">
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        Copy Text
                    </button>
                </div>
                <textarea id="output-text" readonly placeholder="Transformed text will appear here..." 
                    class="w-full h-40 p-4 bg-zinc-50 border border-zinc-200 rounded-xl text-sm outline-none resize-none"></textarea>
            </div>
        </div>
    </div>
    <script>
        const input = document.getElementById('input-text');
        const output = document.getElementById('output-text');
        const copyBtn = document.getElementById('copy-btn');

        function transform(type) {
            const text = input.value;
            if (!text) return;

            let result = '';

            switch (type) {
                case 'upper':
                    result = text.toUpperCase();
                    break;
                case 'lower':
                    result = text.toLowerCase();
                    break;
                case 'title':
                    const minorWords = ['a', 'an', 'the', 'and', 'but', 'for', 'or', 'nor', 'at', 'by', 'from', 'in', 'into', 'of', 'off', 'on', 'onto', 'out', 'over', 'to', 'up', 'with', 'as'];
                    const parts = text.toLowerCase().split(/(\s+)/);
                    const wordsOnly = parts.filter((p, i) => i % 2 === 0 && p.length > 0);
                    let wordIndex = 0;
                    result = parts.map((part, i) => {
                        if (i % 2 !== 0 || part.length === 0) return part;
                        
                        const isFirst = wordIndex === 0;
                        const isLast = wordIndex === wordsOnly.length - 1;
                        wordIndex++;

                        if (!isFirst && !isLast && minorWords.includes(part)) {
                            return part;
                        }
                        return part.charAt(0).toUpperCase() + part.slice(1);
                    }).join('');
                    break;
                case 'sentence':
                    result = text.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w|\n\s*\w)/g, c => c.toUpperCase());
                    break;
                case 'first':
                    result = text.toLowerCase().split(/(\s+)/).map(part => {
                        if (part.length === 0 || /^\s+$/.test(part)) return part;
                        return part.charAt(0).toUpperCase() + part.slice(1);
                    }).join('');
                    break;
                case 'toggle':
                    result = text.split('').map(char => {
                        if (char === char.toUpperCase()) return char.toLowerCase();
                        return char.toUpperCase();
                    }).join('');
                    break;
            }

            output.value = result;
        }

        async function copyOutput() {
            if (!output.value) return;
            
            try {
                await navigator.clipboard.writeText(output.value);
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!';
                lucide.createIcons();
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>

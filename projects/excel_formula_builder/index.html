<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Formula Architect - Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        /* Grid Styles */
        #grid-container {
            position: relative;
            overflow: auto;
            background-color: #f9fafb;
        }
        #grid-spacer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        #grid-content {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
        }
        .cell {
            position: absolute;
            border-right: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            user-select: none;
        }
        .cell:hover {
            background-color: #eff6ff;
            z-index: 5;
        }
        .header-cell {
            position: absolute;
            background-color: #f3f4f6;
            border-right: 1px solid #d1d5db;
            border-bottom: 1px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            color: #4b5563;
            user-select: none;
            z-index: 10;
        }
        .header-cell.active {
            background-color: #dbeafe;
            color: #1d4ed8;
            font-weight: 700;
        }
        .corner-cell {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 30px;
            background-color: #f3f4f6;
            border-right: 1px solid #d1d5db;
            border-bottom: 1px solid #d1d5db;
            z-index: 30;
        }
        #col-headers {
            position: sticky;
            top: 0;
            left: 40px;
            height: 30px;
            z-index: 20;
            background: #f3f4f6;
        }
        #row-headers {
            position: sticky;
            left: 0;
            top: 30px;
            width: 40px;
            z-index: 20;
            background: #f3f4f6;
        }
    </style>
</head>
<body class="bg-white text-zinc-900 h-screen flex overflow-hidden">

    <!-- Main Workspace -->
    <div class="flex-1 flex flex-col min-w-0 relative">
        <div id="grid-container" class="flex-1 custom-scrollbar">
            <div class="corner-cell"></div>
            <div id="grid-spacer"></div>
            <div id="grid-content">
                <!-- Cells will be rendered here via JS -->
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="w-[450px] h-full flex flex-col border-l border-zinc-300 bg-zinc-50">
        <!-- Formula Editor -->
        <div class="flex-1 p-6 flex flex-col min-h-0">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-1.5 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 rounded-md transition-colors" title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-500">Formula Editor</h2>
                </div>
                <div class="flex gap-2">
                    <button id="clear-btn" class="p-1.5 text-zinc-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors" title="Clear Formula">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <button id="copy-btn" class="p-1.5 text-zinc-400 hover:text-blue-500 hover:bg-blue-50 rounded-md transition-colors" title="Copy to Clipboard">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 relative">
                <textarea id="formula-input" 
                    placeholder="Select cells or use buttons to build your formula..."
                    class="w-full h-full p-4 bg-white border border-zinc-200 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none resize-none font-mono text-sm leading-relaxed transition-all"></textarea>
            </div>
        </div>

        <!-- Presets -->
        <div class="h-[350px] border-t border-zinc-200 bg-white overflow-y-auto custom-scrollbar">
            <div class="sticky top-0 bg-white z-10 px-6 pt-6 pb-4">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-500">Presets</h2>
            </div>
            <div id="presets-container" class="px-6 pb-6 grid grid-cols-2 gap-3">
                <!-- Presets will be rendered here via JS -->
            </div>
        </div>
    </div>

    <script>
        // --- Constants & State ---
        const COLUMN_COUNT = 18278; // A to ZZZ
        const ROW_COUNT = 999;
        const COLUMN_WIDTH = 100;
        const ROW_HEIGHT = 30;
        const HEADER_HEIGHT = 30;
        const ROW_HEADER_WIDTH = 40;

        const PRESETS = [
            { label: '¶', add: '&char(10)&' },
            { label: '¶<br>¶', add: '&char(10)&"<br>"&char(10)&' },
            { label: '<p>¶Dimension(s):¶<br>¶', add: '"<p>"&char(10)&"<strong>Dimension(s):</strong>"&char(10)&"<br>"&char(10)&' },
            { label: '<br><br>¶Load Rating(s):¶<br>¶', add: '&char(10)&"<br><br>"&char(10)&"<strong>Load Rating(s):</strong>"&char(10)&"<br>"&char(10)&' },
            { label: '_(', add: '&" ("&' },
            { label: ')_=_', add: '&") = "&' },
            { label: 'IFERROR', add: 'IFERROR(' },
            { label: 'VLOOKUP', add: 'VLOOKUP(' },
            { label: 'CONCATENATE', add: 'CONCATENATE(' },
            { label: 'TEXTJOIN', add: 'TEXTJOIN(", ", TRUE, ' },
            { label: 'SUBSTITUTE', add: 'SUBSTITUTE(' },
            { label: 'TRIM', add: 'TRIM(' },
        ];

        let hoveredCell = null;

        // --- DOM Elements ---
        const gridContainer = document.getElementById('grid-container');
        const gridSpacer = document.getElementById('grid-spacer');
        const gridContent = document.getElementById('grid-content');
        const formulaInput = document.getElementById('formula-input');
        const presetsContainer = document.getElementById('presets-container');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');

        // --- Utilities ---
        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, function(m) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[m];
            });
        }

        function getColumnName(index) {
            let name = "";
            let i = index;
            while (i >= 0) {
                name = String.fromCharCode((i % 26) + 65) + name;
                i = Math.floor(i / 26) - 1;
            }
            return name;
        }

        function insertAtCursor(text) {
            const start = formulaInput.selectionStart;
            const end = formulaInput.selectionEnd;
            const val = formulaInput.value;
            formulaInput.value = val.substring(0, start) + text + val.substring(end);
            formulaInput.focus();
            const newPos = start + text.length;
            formulaInput.setSelectionRange(newPos, newPos);
        }

        // --- Rendering ---
        function renderPresets() {
            presetsContainer.innerHTML = PRESETS.map(btn => `
                <button class="preset-btn flex flex-col items-start p-3 bg-zinc-50 border border-zinc-200 rounded-lg hover:border-blue-300 hover:bg-blue-50 hover:shadow-sm transition-all text-left group" data-add='${btn.add}'>
                    <span class="text-xs font-mono text-zinc-400 mb-1 group-hover:text-blue-400">Label:</span>
                    <span class="text-sm font-medium text-zinc-700 break-all leading-tight">
                        ${btn.label.split('¶').map((part, i, arr) => `
                            ${escapeHTML(part)}${i < arr.length - 1 ? '<span class="text-blue-500 font-bold mx-0.5">¶</span>' : ''}
                        `).join('')}
                    </span>
                    <div class="mt-2 text-[10px] text-zinc-400 font-mono truncate w-full">${escapeHTML(btn.add)}</div>
                </button>
            `).join('');

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.onclick = () => insertAtCursor(btn.getAttribute('data-add'));
            });
        }

        function renderGrid() {
            const scrollTop = gridContainer.scrollTop;
            const scrollLeft = gridContainer.scrollLeft;
            const viewportWidth = gridContainer.clientWidth;
            const viewportHeight = gridContainer.clientHeight;

            // Calculate visible range
            const startRow = Math.max(0, Math.floor((scrollTop - HEADER_HEIGHT) / ROW_HEIGHT));
            const endRow = Math.min(ROW_COUNT - 1, Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT));
            
            const startCol = Math.max(0, Math.floor((scrollLeft - ROW_HEADER_WIDTH) / COLUMN_WIDTH));
            const endCol = Math.min(COLUMN_COUNT - 1, Math.ceil((scrollLeft + viewportWidth) / COLUMN_WIDTH));

            let html = '';

            // Render Column Headers
            for (let c = startCol; c <= endCol; c++) {
                const left = ROW_HEADER_WIDTH + c * COLUMN_WIDTH;
                const isActive = hoveredCell && hoveredCell.c === c;
                html += `<div class="header-cell ${isActive ? 'active' : ''}" style="left: ${left}px; top: ${scrollTop}px; width: ${COLUMN_WIDTH}px; height: ${HEADER_HEIGHT}px;">${getColumnName(c)}</div>`;
            }

            // Render Row Headers
            for (let r = startRow; r <= endRow; r++) {
                const top = HEADER_HEIGHT + r * ROW_HEIGHT;
                const isActive = hoveredCell && hoveredCell.r === r;
                html += `<div class="header-cell ${isActive ? 'active' : ''}" style="left: ${scrollLeft}px; top: ${top}px; width: ${ROW_HEADER_WIDTH}px; height: ${ROW_HEIGHT}px;">${r + 1}</div>`;
            }

            // Render Cells
            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    const top = HEADER_HEIGHT + r * ROW_HEIGHT;
                    const left = ROW_HEADER_WIDTH + c * COLUMN_WIDTH;
                    const isHovered = hoveredCell && hoveredCell.r === r && hoveredCell.c === c;
                    const isRowHovered = hoveredCell && hoveredCell.r === r;
                    const isColHovered = hoveredCell && hoveredCell.c === c;
                    
                    let bgClass = 'bg-white';
                    if (isHovered) bgClass = 'bg-blue-100 ring-1 ring-inset ring-blue-400 z-10';
                    else if (isRowHovered || isColHovered) bgClass = 'bg-blue-50/50';

                    html += `
                        <div class="cell ${bgClass}" 
                             style="left: ${left}px; top: ${top}px; width: ${COLUMN_WIDTH}px; height: ${ROW_HEIGHT}px;"
                             data-r="${r}" data-c="${c}">
                        </div>`;
                }
            }

            gridContent.innerHTML = html;
        }

        // --- Event Listeners ---
        gridContainer.onscroll = () => {
            requestAnimationFrame(renderGrid);
        };

        gridContent.onclick = (e) => {
            const cell = e.target.closest('.cell');
            if (cell) {
                const r = parseInt(cell.getAttribute('data-r'));
                const c = parseInt(cell.getAttribute('data-c'));
                const ref = getColumnName(c) + (r + 1);
                insertAtCursor(ref);
            }
        };

        gridContent.onmousemove = (e) => {
            const cell = e.target.closest('.cell');
            if (cell) {
                const r = parseInt(cell.getAttribute('data-r'));
                const c = parseInt(cell.getAttribute('data-c'));
                if (!hoveredCell || hoveredCell.r !== r || hoveredCell.c !== c) {
                    hoveredCell = { r, c };
                    renderGrid();
                }
            } else {
                if (hoveredCell) {
                    hoveredCell = null;
                    renderGrid();
                }
            }
        };

        gridContent.onmouseleave = () => {
            hoveredCell = null;
            renderGrid();
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(formulaInput.value);
            // Simple feedback
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-emerald-500"></i>';
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
                lucide.createIcons();
            }, 2000);
        };

        clearBtn.onclick = () => {
            formulaInput.value = '';
            formulaInput.focus();
        };

        // --- Initialization ---
        function init() {
            // Set spacer size
            gridSpacer.style.width = (ROW_HEADER_WIDTH + COLUMN_COUNT * COLUMN_WIDTH) + 'px';
            gridSpacer.style.height = (HEADER_HEIGHT + ROW_COUNT * ROW_HEIGHT) + 'px';

            renderPresets();
            renderGrid();
            lucide.createIcons();
        }

        init();

        // Handle window resize
        window.onresize = renderGrid;
    </script>
</body>
</html>

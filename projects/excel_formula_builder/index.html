<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Formula Builder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2316a34a%22/><g transform=%22scale(2.5) translate(8, 8)%22 stroke=%22white%22 stroke-width=%222%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><rect width=%2218%22 height=%2218%22 x=%223%22 y=%223%22 rx=%222%22/><path d=%22M8 12h8%22/><path d=%22M12 8v8%22/></g></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        /* Grid Styles */
        #grid-container {
            position: relative;
            overflow: auto;
            background-color: #f9fafb;
        }
        #grid-spacer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        #grid-content {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
        }
        .cell {
            position: absolute;
            border-right: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            user-select: none;
        }
        .cell:hover {
            background-color: #f0fdf4; /* emerald-50 */
            z-index: 5;
        }
        .header-cell {
            position: absolute;
            background-color: #f3f4f6;
            border-right: 1px solid #d1d5db;
            border-bottom: 1px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            color: #4b5563;
            user-select: none;
            z-index: 20;
        }
        .header-cell.active {
            background-color: #dcfce7; /* emerald-100 */
            color: #15803d; /* emerald-700 */
            font-weight: 700;
        }
        .corner-cell {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 30px;
            background-color: #f3f4f6;
            border-right: 1px solid #d1d5db;
            border-bottom: 1px solid #d1d5db;
            z-index: 30;
        }
        #col-headers {
            position: sticky;
            top: 0;
            left: 40px;
            height: 30px;
            z-index: 20;
            background: #f3f4f6;
        }
        #row-headers {
            position: sticky;
            left: 0;
            top: 30px;
            width: 40px;
            z-index: 20;
            background: #f3f4f6;
        }
        /* Presets */
        .preset-btn {
            position: relative;
        }
        .preset-delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .preset-btn:hover .preset-delete-btn {
            opacity: 1;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Formula Editor Styles */
        .editor-container {
            position: relative;
            display: grid;
            width: 100%;
            height: 100%;
            background: white;
            border: 1px solid #e5e7eb; /* zinc-200 */
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .editor-container:focus-within {
            border-color: #10b981; /* emerald-500 */
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .formula-backdrop, #formula-input {
            grid-area: 1 / 1;
            width: 100%;
            height: 100%;
            padding: 16px;
            margin: 0;
            border: none;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            background: transparent;
            box-sizing: border-box;
        }
        .formula-backdrop {
            pointer-events: none;
            color: #71717a; /* zinc-400 */
            z-index: 1;
        }
        #formula-input {
            color: transparent;
            caret-color: #18181b; /* zinc-900 */
            z-index: 2;
            resize: none;
        }
        .highlight-ref {
            color: inherit;
            background-color: rgba(16, 185, 129, 0.2); /* emerald-500/20 */
            border-radius: 2px;
        }
        .selection-highlight {
            background-color: rgba(16, 185, 129, 0.3); /* emerald-500/30 */
            border-radius: 2px;
        }
        .ref-active-highlight {
            text-decoration: underline;
            text-underline-offset: 2px;
            font-weight: 700;
            filter: contrast(1.2);
        }
        @keyframes pulse-glow {
            0% { 
                box-shadow: 0 0 0 0 var(--pulse-color, rgba(16, 185, 129, 0.6));
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
            70% { 
                box-shadow: 0 0 0 40px rgba(0, 0, 0, 0);
                transform: scale(1.05);
            }
            100% { 
                box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
                transform: scale(1);
            }
        }
        .active-ref-pulse {
            animation: pulse-glow 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            z-index: 40;
            pointer-events: none;
            border: 3px solid #10b981;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .focus-line-h {
            position: absolute;
            height: 1px;
            background: rgba(16, 185, 129, 0.15);
            pointer-events: none;
            z-index: 34;
        }
        .focus-line-v {
            position: absolute;
            width: 1px;
            background: rgba(16, 185, 129, 0.15);
            pointer-events: none;
            z-index: 34;
        }
        .crosshair-h {
            position: absolute;
            height: 1px;
            background: rgba(16, 185, 129, 0.3);
            pointer-events: none;
            z-index: 35;
        }
        .crosshair-v {
            position: absolute;
            width: 1px;
            background: rgba(16, 185, 129, 0.3);
            pointer-events: none;
            z-index: 35;
        }
    </style>
</head>
<body class="bg-white text-zinc-900 h-screen flex overflow-hidden transition-colors duration-300">

    <!-- Main Workspace -->
    <div class="flex-1 flex flex-col min-w-0 relative">
        <div id="grid-container" class="flex-1 custom-scrollbar">
            <div class="corner-cell"></div>
            <div id="grid-spacer"></div>
            <div id="grid-content">
                <!-- Cells will be rendered here via JS -->
            </div>
            <div id="grid-indicators" class="absolute top-0 left-0 pointer-events-none" style="z-index: 35;">
                <div id="active-pulse" class="active-ref-pulse absolute hidden"></div>
                <div id="focus-line-h-top" class="focus-line-h hidden"></div>
                <div id="focus-line-h-bottom" class="focus-line-h hidden"></div>
                <div id="focus-line-v-left" class="focus-line-v hidden"></div>
                <div id="focus-line-v-right" class="focus-line-v hidden"></div>
                <div id="crosshair-h" class="crosshair-h hidden"></div>
                <div id="crosshair-v" class="crosshair-v hidden"></div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="w-[40%] h-full flex flex-col border-l border-zinc-300 bg-zinc-50">
        <!-- Formula Editor -->
        <div class="flex-1 p-6 flex flex-col min-h-0">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-1.5 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 rounded-md transition-colors" title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-500">Formula Editor</h2>
                </div>
                <div class="flex gap-2">
                    <button id="undo-btn" class="p-1.5 text-zinc-400 hover:text-orange-500 hover:bg-orange-50 rounded-md transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="Undo (Max 5)" disabled>
                        <i data-lucide="undo-2" class="w-4 h-4"></i>
                    </button>
                    <button id="clear-btn" class="p-1.5 text-zinc-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors" title="Clear Formula">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <button id="copy-btn" class="p-1.5 text-zinc-400 hover:text-emerald-500 hover:bg-emerald-50 rounded-md transition-colors" title="Copy to Clipboard">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 min-h-0">
                <div class="editor-container">
                    <div id="formula-backdrop" class="formula-backdrop custom-scrollbar"></div>
                    <textarea id="formula-input" 
                        spellcheck="false"
                        placeholder="Select cells or use buttons to build your formula..."
                        class="custom-scrollbar"></textarea>
                </div>
            </div>
        </div>

        <!-- Presets -->
        <div class="h-[350px] border-t border-zinc-200 bg-white overflow-y-auto custom-scrollbar">
            <div class="sticky top-0 bg-white z-10 px-6 pt-6 pb-4 flex items-center justify-between border-b border-zinc-100 mb-2">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-500">Presets</h2>
                <div class="flex items-center gap-2">
                    <div class="flex items-center bg-zinc-100 rounded-lg p-1 gap-1">
                        <div class="flex items-center gap-1 px-1">
                            <span class="text-[10px] font-bold text-zinc-400">R</span>
                            <input type="number" id="shift-rows" value="0" class="w-10 bg-transparent text-xs font-bold outline-none text-center" title="Row Offset">
                        </div>
                        <div class="w-px h-3 bg-zinc-300"></div>
                        <div class="flex items-center gap-1 px-1">
                            <span class="text-[10px] font-bold text-zinc-400">C</span>
                            <input type="number" id="shift-cols" value="0" class="w-10 bg-transparent text-xs font-bold outline-none text-center" title="Column Offset">
                        </div>
                        <button id="apply-shift-btn" class="p-1 bg-emerald-600 text-white rounded hover:bg-emerald-700 transition-colors" title="Shift Selection/Formula">
                            <i data-lucide="move" class="w-3 h-3"></i>
                        </button>
                    </div>
                    <button id="tools-btn" class="p-1.5 text-zinc-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-md transition-colors" title="Preset Settings">
                        <i data-lucide="settings-2" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div id="presets-container" class="px-6 pb-6 grid grid-cols-3 gap-3">
                <!-- Presets will be rendered here via JS -->
            </div>
        </div>
    </div>

    <!-- Formula Tools Modal -->
    <div id="tools-modal" class="modal-overlay">
        <div class="modal-content w-[400px]">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-zinc-900">Manage Presets</h3>
                <button id="close-tools-modal" class="text-zinc-400 hover:text-zinc-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <div class="flex items-center justify-between p-3 bg-zinc-50 rounded-xl border border-zinc-100">
                    <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Delete Mode</span>
                    <button id="toggle-manage-mode" class="text-xs font-bold text-emerald-600 hover:underline">Enable</button>
                </div>

                <div class="space-y-4 pt-4 border-t border-zinc-100">
                    <h4 class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Add New Preset</h4>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase mb-1">Label</label>
                        <input type="text" id="new-preset-label" placeholder="e.g. IFERROR" class="w-full p-2.5 bg-zinc-50 border border-zinc-200 rounded-lg text-sm outline-none focus:border-emerald-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase mb-1">Snippet</label>
                        <textarea id="new-preset-add" placeholder="e.g. IFERROR(" class="w-full p-2.5 bg-zinc-50 border border-zinc-200 rounded-lg text-sm outline-none focus:border-emerald-500 transition-all h-20 resize-none font-mono"></textarea>
                    </div>
                    <button id="save-preset-btn" class="w-full py-2.5 bg-emerald-600 text-white text-sm font-bold rounded-lg hover:bg-emerald-700 transition-all shadow-sm">Add Preset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & State ---
        const COLUMN_COUNT = 18278; // A to ZZZ
        const ROW_COUNT = 9999;
        const COLUMN_WIDTH = 100;
        const ROW_HEIGHT = 30;
        const HEADER_HEIGHT = 30;
        const ROW_HEADER_WIDTH = 40;

        const DEFAULT_PRESETS = [
            { label: '¶', add: '&char(10)&', isDefault: true },
            { label: '¶<br>¶', add: '&char(10)&"<br>"&char(10)&', isDefault: true },
            { label: '&', add: '&', isDefault: true },
            { label: '_(', add: '&" ("&', isDefault: true },
            { label: ')_=_', add: '&") = "&', isDefault: true },
            { label: '<p>¶Dimension(s):¶<br>¶', add: '="<p>"&char(10)&"<strong>Dimension(s):</strong>"&char(10)&"<br>"&char(10)&', isDefault: true },
            { label: '¶<br><br>¶Load Rating(s):¶<br>¶', add: '&char(10)&"<br><br>"&char(10)&"<strong>Load Rating(s):</strong>"&char(10)&"<br>"&char(10)&', isDefault: true },
            { label: '¶<br><br>¶Note(s):¶<br>¶', add: '&char(10)&"<br><br>"&char(10)&"<strong>Note(s):</strong>"&char(10)&"<br>"&char(10)&', isDefault: true },
        ];

        let presets = [];
        let hoveredCell = null;
        let activeRef = null; // Reference at cursor in editor
        let isManageMode = false;
        let referencedCells = {}; // Map of "A1" -> color
        let currentSelection = { start: 0, end: 0 };
        let undoHistory = [];
        const MAX_HISTORY = 5;
        let lastManualValue = "";

        const HIGHLIGHT_COLORS = [
            { bg: 'bg-indigo-500/20', border: 'border-indigo-500', text: 'text-indigo-600', pulse: 'rgba(99, 102, 241, 0.6)' },
            { bg: 'bg-emerald-500/20', border: 'border-emerald-500', text: 'text-emerald-600', pulse: 'rgba(16, 185, 129, 0.6)' },
            { bg: 'bg-purple-500/20', border: 'border-purple-500', text: 'text-purple-600', pulse: 'rgba(168, 85, 247, 0.6)' },
            { bg: 'bg-orange-500/20', border: 'border-orange-500', text: 'text-orange-600', pulse: 'rgba(249, 115, 22, 0.6)' },
            { bg: 'bg-pink-500/20', border: 'border-pink-500', text: 'text-pink-600', pulse: 'rgba(236, 72, 153, 0.6)' },
            { bg: 'bg-cyan-500/20', border: 'border-cyan-500', text: 'text-cyan-600', pulse: 'rgba(6, 182, 212, 0.6)' },
        ];

        // --- DOM Elements ---
        const gridContainer = document.getElementById('grid-container');
        const gridSpacer = document.getElementById('grid-spacer');
        const gridContent = document.getElementById('grid-content');
        const formulaInput = document.getElementById('formula-input');
        const formulaBackdrop = document.getElementById('formula-backdrop');
        const presetsContainer = document.getElementById('presets-container');
        const activePulse = document.getElementById('active-pulse');
        const focusLineHTop = document.getElementById('focus-line-h-top');
        const focusLineHBottom = document.getElementById('focus-line-h-bottom');
        const focusLineVLeft = document.getElementById('focus-line-v-left');
        const focusLineVRight = document.getElementById('focus-line-v-right');
        const crosshairH = document.getElementById('crosshair-h');
        const crosshairV = document.getElementById('crosshair-v');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const undoBtn = document.getElementById('undo-btn');
        const toolsBtn = document.getElementById('tools-btn');
        const toolsModal = document.getElementById('tools-modal');
        const closeToolsModalBtn = document.getElementById('close-tools-modal');
        const savePresetBtn = document.getElementById('save-preset-btn');
        const newPresetLabel = document.getElementById('new-preset-label');
        const newPresetAdd = document.getElementById('new-preset-add');
        const toggleManageModeBtn = document.getElementById('toggle-manage-mode');
        const applyShiftBtn = document.getElementById('apply-shift-btn');
        const shiftRowsInput = document.getElementById('shift-rows');
        const shiftColsInput = document.getElementById('shift-cols');

        // --- Utilities ---
        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, function(m) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[m];
            });
        }

        function getColumnIndex(name) {
            let index = 0;
            for (let i = 0; i < name.length; i++) {
                index = index * 26 + (name.charCodeAt(i) - 64);
            }
            return index - 1;
        }

        function getColumnName(index) {
            let name = "";
            let i = index;
            while (i >= 0) {
                name = String.fromCharCode((i % 26) + 65) + name;
                i = Math.floor(i / 26) - 1;
            }
            return name;
        }

        function parseCellRef(ref) {
            if (!ref) return null;
            const match = ref.match(/^([A-Z]+)([0-9]+)$/);
            if (!match) return null;
            return {
                c: getColumnIndex(match[1]),
                r: parseInt(match[2]) - 1
            };
        }

        function shiftFormula(formula, rowOffset, colOffset) {
            const regex = /\b([A-Z]{1,3})([0-9]{1,7})\b/g;
            return formula.replace(regex, (match, colPart, rowPart) => {
                let colIndex = getColumnIndex(colPart);
                let rowIndex = parseInt(rowPart) - 1;

                let newColIndex = Math.max(0, colIndex + colOffset);
                let newRowIndex = Math.max(0, rowIndex + rowOffset);

                return getColumnName(newColIndex) + (newRowIndex + 1);
            });
        }

        function pushToHistory(value) {
            if (undoHistory.length > 0 && undoHistory[undoHistory.length - 1] === value) return;
            undoHistory.push(value);
            if (undoHistory.length > MAX_HISTORY) {
                undoHistory.shift();
            }
            updateUndoButton();
        }

        function updateUndoButton() {
            if (undoBtn) {
                undoBtn.disabled = undoHistory.length === 0;
            }
        }

        function updateActiveRef() {
            const pos = formulaInput.selectionStart;
            const formula = formulaInput.value;
            const regex = /\b([A-Z]{1,3}[0-9]{1,7})\b/g;
            let match;
            let foundRef = null;
            while ((match = regex.exec(formula)) !== null) {
                if (pos >= match.index && pos <= match.index + match[0].length) {
                    foundRef = match[0];
                    break;
                }
            }
            if (activeRef !== foundRef) {
                activeRef = foundRef;
                renderGrid();
                renderHighlighter();
            }
        }

        function insertAtCursor(text) {
            pushToHistory(formulaInput.value);
            const start = formulaInput.selectionStart;
            const end = formulaInput.selectionEnd;
            const val = formulaInput.value;
            formulaInput.value = val.substring(0, start) + text + val.substring(end);
            formulaInput.focus();
            const newPos = start + text.length;
            formulaInput.setSelectionRange(newPos, newPos);
            saveFormula();
            updateReferences();
        }

        function updateReferences() {
            const formula = formulaInput.value;
            const regex = /\b([A-Z]{1,3}[0-9]{1,7})\b/g;
            const matches = [...new Set(formula.match(regex) || [])];
            
            referencedCells = {};
            matches.forEach((ref, i) => {
                referencedCells[ref] = HIGHLIGHT_COLORS[i % HIGHLIGHT_COLORS.length];
            });

            renderHighlighter();
            renderGrid();
        }

        function renderHighlighter() {
            const formula = formulaInput.value;
            const { start, end } = currentSelection;
            const hasSelection = start !== end;
            
            const regex = /\b([A-Z]{1,3}[0-9]{1,7})\b/g;
            
            // If we have a selection, we need to be careful about overlapping highlights.
            // We'll first identify all cell references and their positions.
            let parts = [];
            let lastIdx = 0;
            let match;
            
            // Reset regex lastIndex
            regex.lastIndex = 0;
            
            while ((match = regex.exec(formula)) !== null) {
                // Add text before match
                if (match.index > lastIdx) {
                    parts.push({ text: formula.substring(lastIdx, match.index), type: 'text' });
                }
                // Add match
                parts.push({ text: match[0], type: 'ref', ref: match[0] });
                lastIdx = regex.lastIndex;
            }
            // Add remaining text
            if (lastIdx < formula.length) {
                parts.push({ text: formula.substring(lastIdx), type: 'text' });
            }

            // Now we have a list of parts. We need to handle the selection overlay.
            // A simpler way to handle selection that might span multiple parts:
            // We'll render the formula with cell highlights, then overlay the selection.
            // But since we use a backdrop, we can just wrap the selection range in a span.
            // To handle overlapping, we'll just render the cell highlights first, 
            // then if there's a selection, we'll apply a "selected" class to the spans or wrap the selection.
            
            // Actually, the most robust way is to render the whole thing as one string 
            // and inject the selection span at the correct character offsets.
            
            let resultHtml = "";
            let currentPos = 0;
            
            // We'll iterate character by character or use a more efficient method.
            // Let's use the parts we already have and split them if the selection starts/ends inside them.
            let finalParts = [];
            parts.forEach(part => {
                const partStart = currentPos;
                const partEnd = currentPos + part.text.length;
                
                // Check if selection overlaps this part
                const overlapStart = Math.max(partStart, start);
                const overlapEnd = Math.min(partEnd, end);
                
                if (hasSelection && overlapStart < overlapEnd) {
                    // Selection overlaps. Split the part.
                    if (overlapStart > partStart) {
                        finalParts.push({ ...part, text: formula.substring(partStart, overlapStart), selected: false });
                    }
                    finalParts.push({ ...part, text: formula.substring(overlapStart, overlapEnd), selected: true });
                    if (overlapEnd < partEnd) {
                        finalParts.push({ ...part, text: formula.substring(overlapEnd, partEnd), selected: false });
                    }
                } else {
                    finalParts.push({ ...part, selected: false });
                }
                currentPos = partEnd;
            });

            resultHtml = finalParts.map(part => {
                let content = escapeHTML(part.text);
                let classes = [];
                if (part.type === 'ref') {
                    const color = referencedCells[part.ref];
                    if (color) {
                        classes.push('highlight-ref', color.bg, color.text);
                    }
                    
                    // Highlight if this cell is hovered in the grid
                    const hoveredCellRef = hoveredCell ? getColumnName(hoveredCell.c) + (hoveredCell.r + 1) : null;
                    if (part.ref === hoveredCellRef) {
                        classes.push('ref-active-highlight');
                    }
                }
                if (part.selected) {
                    classes.push('selection-highlight');
                }
                
                if (classes.length > 0) {
                    return `<span class="${classes.join(' ')}">${content}</span>`;
                }
                return content;
            }).join('');

            formulaBackdrop.innerHTML = resultHtml + (formula.endsWith('\n') ? ' ' : '');
        }

        // --- Rendering ---
        function renderPresets() {
            presetsContainer.innerHTML = presets.map((btn, index) => `
                <div class="preset-btn-wrapper relative group">
                    <button class="preset-btn w-full flex flex-col items-start p-3 bg-zinc-50 border border-zinc-200 rounded-lg hover:border-emerald-300 hover:bg-emerald-50 hover:shadow-sm transition-all text-left group" data-index="${index}">
                        <span class="text-xs font-mono text-zinc-400 mb-1 group-hover:text-emerald-400"></span>
                        <span class="text-sm font-medium text-zinc-700 break-all leading-tight">
                            ${btn.label.split('¶').map((part, i, arr) => `
                                ${escapeHTML(part)}${i < arr.length - 1 ? '<span class="text-emerald-500 font-bold mx-0.5">¶</span>' : ''}
                            `).join('')}
                        </span>
                        <div class="mt-2 text-[10px] text-zinc-400 font-mono truncate w-full">${escapeHTML(btn.add)}</div>
                    </button>
                    ${isManageMode && !btn.isDefault ? `
                        <button class="preset-delete-btn opacity-100" data-delete-index="${index}">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    ` : ''}
                </div>
            `).join('');

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.onclick = () => {
                    const index = parseInt(btn.getAttribute('data-index'));
                    insertAtCursor(presets[index].add);
                };
            });

            if (isManageMode) {
                document.querySelectorAll('.preset-delete-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        const index = parseInt(btn.getAttribute('data-delete-index'));
                        presets.splice(index, 1);
                        savePresets();
                        renderPresets();
                        lucide.createIcons();
                    };
                });
            }
            lucide.createIcons();
        }

        function renderGrid() {
            const scrollTop = gridContainer.scrollTop;
            const scrollLeft = gridContainer.scrollLeft;
            const viewportWidth = gridContainer.clientWidth;
            const viewportHeight = gridContainer.clientHeight;

            // Calculate visible range
            const startRow = Math.max(0, Math.floor((scrollTop - HEADER_HEIGHT) / ROW_HEIGHT));
            const endRow = Math.min(ROW_COUNT - 1, Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT));
            
            const startCol = Math.max(0, Math.floor((scrollLeft - ROW_HEADER_WIDTH) / COLUMN_WIDTH));
            const endCol = Math.min(COLUMN_COUNT - 1, Math.ceil((scrollLeft + viewportWidth) / COLUMN_WIDTH));

            let html = '';
            const activeCell = parseCellRef(activeRef);

            // Render Column Headers
            for (let c = startCol; c <= endCol; c++) {
                const left = ROW_HEADER_WIDTH + c * COLUMN_WIDTH;
                const isActive = (hoveredCell && hoveredCell.c === c) || (activeCell && activeCell.c === c);
                html += `<div class="header-cell ${isActive ? 'active' : ''}" style="left: ${left}px; top: ${scrollTop}px; width: ${COLUMN_WIDTH}px; height: ${HEADER_HEIGHT}px;">${getColumnName(c)}</div>`;
            }

            // Render Row Headers
            for (let r = startRow; r <= endRow; r++) {
                const top = HEADER_HEIGHT + r * ROW_HEIGHT;
                const isActive = (hoveredCell && hoveredCell.r === r) || (activeCell && activeCell.r === r);
                html += `<div class="header-cell ${isActive ? 'active' : ''}" style="left: ${scrollLeft}px; top: ${top}px; width: ${ROW_HEADER_WIDTH}px; height: ${ROW_HEIGHT}px;">${r + 1}</div>`;
            }

            // Update Persistent Indicators
            if (activeCell) {
                const top = HEADER_HEIGHT + activeCell.r * ROW_HEIGHT;
                const left = ROW_HEADER_WIDTH + activeCell.c * COLUMN_WIDTH;
                const cellRef = getColumnName(activeCell.c) + (activeCell.r + 1);
                const highlight = referencedCells[cellRef];
                const pulseColor = highlight ? highlight.pulse : 'rgba(16, 185, 129, 0.6)';
                const borderColor = highlight ? highlight.border.replace('border-', '') : '#10b981';

                // Pulse
                activePulse.style.display = 'block';
                activePulse.style.top = `${top}px`;
                activePulse.style.left = `${left}px`;
                activePulse.style.width = `${COLUMN_WIDTH}px`;
                activePulse.style.height = `${ROW_HEIGHT}px`;
                activePulse.style.setProperty('--pulse-color', pulseColor);
                activePulse.style.borderColor = borderColor;

                // Focus Lines (Frame the cell)
                const gridWidth = ROW_HEADER_WIDTH + COLUMN_COUNT * COLUMN_WIDTH;
                const gridHeight = HEADER_HEIGHT + ROW_COUNT * ROW_HEIGHT;

                focusLineHTop.style.display = 'block';
                focusLineHTop.style.top = `${top}px`;
                focusLineHTop.style.width = `${gridWidth}px`;

                focusLineHBottom.style.display = 'block';
                focusLineHBottom.style.top = `${top + ROW_HEIGHT}px`;
                focusLineHBottom.style.width = `${gridWidth}px`;

                focusLineVLeft.style.display = 'block';
                focusLineVLeft.style.left = `${left}px`;
                focusLineVLeft.style.height = `${gridHeight}px`;

                focusLineVRight.style.display = 'block';
                focusLineVRight.style.left = `${left + COLUMN_WIDTH}px`;
                focusLineVRight.style.height = `${gridHeight}px`;

                // Crosshairs (Center lines)
                const hCenter = top + (ROW_HEIGHT / 2);
                const vCenter = left + (COLUMN_WIDTH / 2);
                
                crosshairH.style.display = 'block';
                crosshairH.style.top = `${hCenter}px`;
                crosshairH.style.width = `${gridWidth}px`;
                
                crosshairV.style.display = 'block';
                crosshairV.style.left = `${vCenter}px`;
                crosshairV.style.height = `${gridHeight}px`;
            } else {
                activePulse.style.display = 'none';
                focusLineHTop.style.display = 'none';
                focusLineHBottom.style.display = 'none';
                focusLineVLeft.style.display = 'none';
                focusLineVRight.style.display = 'none';
                crosshairH.style.display = 'none';
                crosshairV.style.display = 'none';
            }

            // Render Cells
            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    const top = HEADER_HEIGHT + r * ROW_HEIGHT;
                    const left = ROW_HEADER_WIDTH + c * COLUMN_WIDTH;
                    const isHovered = hoveredCell && hoveredCell.r === r && hoveredCell.c === c;
                    const isRowHovered = hoveredCell && hoveredCell.r === r;
                    const isColHovered = hoveredCell && hoveredCell.c === c;
                    
                    const cellRef = getColumnName(c) + (r + 1);
                    const highlight = referencedCells[cellRef];
                    const isActiveRef = activeRef === cellRef;

                    let bgClass = 'bg-white';
                    let borderClass = 'border-zinc-200';
                    let extraClass = '';

                    if (highlight) {
                        bgClass = highlight.bg;
                        borderClass = highlight.border;
                        extraClass = `ring-1 ring-inset ${highlight.border.replace('border-', 'ring-')} z-10`;
                    }

                    if (isActiveRef) {
                        // Pulse is now a persistent element, but we still want the cell background
                        if (!highlight) bgClass = 'bg-emerald-50';
                        extraClass += ' z-20'; // Keep it above others
                    } else if (isHovered) {
                        extraClass += ' ring-2 ring-emerald-400 ring-inset z-10';
                        if (!highlight) bgClass = 'bg-emerald-100';
                    } else if (isRowHovered || isColHovered) {
                        if (!highlight) bgClass = 'bg-emerald-50/50';
                    }

                    html += `
                        <div class="cell ${bgClass} ${borderClass} ${extraClass}" 
                             style="left: ${left}px; top: ${top}px; width: ${COLUMN_WIDTH}px; height: ${ROW_HEIGHT}px;"
                             data-r="${r}" data-c="${c}">
                        </div>`;
                }
            }

            gridContent.innerHTML = html;
        }

        // --- Event Listeners ---
        gridContainer.onscroll = () => {
            requestAnimationFrame(renderGrid);
        };

        gridContent.onclick = (e) => {
            const cell = e.target.closest('.cell');
            if (cell) {
                const r = parseInt(cell.getAttribute('data-r'));
                const c = parseInt(cell.getAttribute('data-c'));
                const ref = getColumnName(c) + (r + 1);
                insertAtCursor(ref);
            }
        };

        gridContent.onmousemove = (e) => {
            const cell = e.target.closest('.cell');
            if (cell) {
                const r = parseInt(cell.getAttribute('data-r'));
                const c = parseInt(cell.getAttribute('data-c'));
                if (!hoveredCell || hoveredCell.r !== r || hoveredCell.c !== c) {
                    hoveredCell = { r, c };
                    renderGrid();
                    renderHighlighter();
                }
            } else {
                if (hoveredCell) {
                    hoveredCell = null;
                    renderGrid();
                    renderHighlighter();
                }
            }
        };

        gridContent.onmouseleave = () => {
            hoveredCell = null;
            renderGrid();
            renderHighlighter();
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(formulaInput.value);
            // Simple feedback
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-emerald-500"></i>';
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
                lucide.createIcons();
            }, 2000);
        };

        clearBtn.onclick = () => {
            pushToHistory(formulaInput.value);
            formulaInput.value = '';
            saveFormula();
            updateReferences();
            formulaInput.focus();
        };

        undoBtn.onclick = () => {
            if (undoHistory.length === 0) return;
            const previousFormula = undoHistory.pop();
            formulaInput.value = previousFormula;
            saveFormula();
            updateReferences();
            updateUndoButton();
            formulaInput.focus();
        };

        toolsBtn.onclick = () => {
            toolsModal.style.display = 'flex';
            lucide.createIcons();
        };

        closeToolsModalBtn.onclick = () => {
            toolsModal.style.display = 'none';
        };

        toggleManageModeBtn.onclick = () => {
            isManageMode = !isManageMode;
            toggleManageModeBtn.textContent = isManageMode ? 'Disable Delete Mode' : 'Enable Delete Mode';
            toggleManageModeBtn.classList.toggle('text-red-600', isManageMode);
            toggleManageModeBtn.classList.toggle('text-emerald-600', !isManageMode);
            renderPresets();
        };

        applyShiftBtn.onclick = () => {
            const rows = parseInt(shiftRowsInput.value) || 0;
            const cols = parseInt(shiftColsInput.value) || 0;
            
            if (rows === 0 && cols === 0) return;

            pushToHistory(formulaInput.value);

            const start = formulaInput.selectionStart;
            const end = formulaInput.selectionEnd;
            const hasSelection = start !== end;

            if (hasSelection) {
                const selectedText = formulaInput.value.substring(start, end);
                const shiftedText = shiftFormula(selectedText, rows, cols);
                formulaInput.value = formulaInput.value.substring(0, start) + shiftedText + formulaInput.value.substring(end);
                // Restore selection
                formulaInput.setSelectionRange(start, start + shiftedText.length);
            } else {
                formulaInput.value = shiftFormula(formulaInput.value, rows, cols);
            }

            saveFormula();
            updateReferences();
            
            // Visual feedback
            const originalIcon = applyShiftBtn.innerHTML;
            applyShiftBtn.innerHTML = '<i data-lucide="check" class="w-3 h-3"></i>';
            applyShiftBtn.classList.replace('bg-emerald-600', 'bg-zinc-900');
            setTimeout(() => {
                applyShiftBtn.innerHTML = originalIcon;
                applyShiftBtn.classList.replace('bg-zinc-900', 'bg-emerald-600');
                lucide.createIcons();
            }, 1000);
            lucide.createIcons();
        };

        savePresetBtn.onclick = () => {
            const label = newPresetLabel.value.trim();
            const add = newPresetAdd.value.trim();
            
            if (label && add) {
                presets.push({ label, add });
                savePresets();
                renderPresets();
                newPresetLabel.value = '';
                newPresetAdd.value = '';
            }
        };

        window.onclick = (e) => {
            if (e.target === toolsModal) {
                toolsModal.style.display = 'none';
            }
        };

        function savePresets() {
            localStorage.setItem('excel_formula_presets', JSON.stringify(presets));
        }

        function saveFormula() {
            localStorage.setItem('excel_current_formula', formulaInput.value);
        }

        function loadFormula() {
            const saved = localStorage.getItem('excel_current_formula');
            if (saved) {
                formulaInput.value = saved;
                updateReferences();
            }
        }

        function loadPresets() {
            const saved = localStorage.getItem('excel_formula_presets');
            if (saved) {
                presets = JSON.parse(saved);
            } else {
                presets = [...DEFAULT_PRESETS];
            }
        }

        // --- Initialization ---
        function init() {
            // Set spacer size
            gridSpacer.style.width = (ROW_HEADER_WIDTH + COLUMN_COUNT * COLUMN_WIDTH) + 'px';
            gridSpacer.style.height = (HEADER_HEIGHT + ROW_COUNT * ROW_HEIGHT) + 'px';

            loadPresets();
            loadFormula();
            renderPresets();
            renderGrid();
            updateUndoButton();
            lucide.createIcons();
        }

        init();

        formulaInput.oninput = () => {
            currentSelection = { start: formulaInput.selectionStart, end: formulaInput.selectionEnd };
            saveFormula();
            updateReferences();
            updateActiveRef();
        };

        const updateSelection = () => {
            const start = formulaInput.selectionStart;
            const end = formulaInput.selectionEnd;
            if (start !== currentSelection.start || end !== currentSelection.end) {
                currentSelection = { start, end };
                renderHighlighter();
                updateActiveRef();
            }
        };

        formulaInput.onmouseup = updateSelection;
        formulaInput.onkeyup = updateSelection;
        formulaInput.onfocus = () => {
            lastManualValue = formulaInput.value;
            updateSelection();
        };
        formulaInput.onblur = () => {
            if (formulaInput.value !== lastManualValue) {
                pushToHistory(lastManualValue);
            }
            updateSelection();
        };

        formulaInput.onscroll = () => {
            formulaBackdrop.scrollTop = formulaInput.scrollTop;
            formulaBackdrop.scrollLeft = formulaInput.scrollLeft;
        };

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === formulaInput) {
                updateActiveRef();
            }
        });

        // Handle window resize
        window.onresize = renderGrid;
    </script>
</body>
</html>

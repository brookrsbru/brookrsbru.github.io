<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Formula Architect - Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        /* Grid Styles */
        #grid-container {
            position: relative;
            overflow: auto;
            background-color: #f9fafb;
        }
        #grid-spacer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        #grid-content {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
        }
        .cell {
            position: absolute;
            border-right: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            user-select: none;
        }
        .cell:hover {
            background-color: #eff6ff;
            z-index: 5;
        }
        .header-cell {
            position: absolute;
            background-color: #f3f4f6;
            border-right: 1px solid #d1d5db;
            border-bottom: 1px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            color: #4b5563;
            user-select: none;
            z-index: 10;
        }
        .header-cell.active {
            background-color: #dbeafe;
            color: #1d4ed8;
            font-weight: 700;
        }
        .corner-cell {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 30px;
            background-color: #f3f4f6;
            border-right: 1px solid #d1d5db;
            border-bottom: 1px solid #d1d5db;
            z-index: 30;
        }
        #col-headers {
            position: sticky;
            top: 0;
            left: 40px;
            height: 30px;
            z-index: 20;
            background: #f3f4f6;
        }
        #row-headers {
            position: sticky;
            left: 0;
            top: 30px;
            width: 40px;
            z-index: 20;
            background: #f3f4f6;
        }
        /* Presets */
        .preset-btn {
            position: relative;
        }
        .preset-delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .preset-btn:hover .preset-delete-btn {
            opacity: 1;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-white text-zinc-900 h-screen flex overflow-hidden">

    <!-- Main Workspace -->
    <div class="flex-1 flex flex-col min-w-0 relative">
        <div id="grid-container" class="flex-1 custom-scrollbar">
            <div class="corner-cell"></div>
            <div id="grid-spacer"></div>
            <div id="grid-content">
                <!-- Cells will be rendered here via JS -->
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="w-[40%] h-full flex flex-col border-l border-zinc-300 bg-zinc-50">
        <!-- Formula Editor -->
        <div class="flex-1 p-6 flex flex-col min-h-0">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-1.5 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-200 rounded-md transition-colors" title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-500">Formula Editor</h2>
                </div>
                <div class="flex gap-2">
                    <button id="clear-btn" class="p-1.5 text-zinc-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors" title="Clear Formula">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <button id="copy-btn" class="p-1.5 text-zinc-400 hover:text-blue-500 hover:bg-blue-50 rounded-md transition-colors" title="Copy to Clipboard">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 relative">
                <textarea id="formula-input" 
                    placeholder="Select cells or use buttons to build your formula..."
                    class="w-full h-full p-4 bg-white border border-zinc-200 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none resize-none font-mono text-sm leading-relaxed transition-all"></textarea>
            </div>
        </div>

        <!-- Presets -->
        <div class="h-[350px] border-t border-zinc-200 bg-white overflow-y-auto custom-scrollbar">
            <div class="sticky top-0 bg-white z-10 px-6 pt-6 pb-4 flex items-center justify-between">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-500">Presets</h2>
                <button id="manage-presets-btn" class="text-xs font-medium text-blue-600 hover:text-blue-700 hover:underline">Manage</button>
            </div>
            <div id="presets-container" class="px-6 pb-6 grid grid-cols-3 gap-3">
                <!-- Presets will be rendered here via JS -->
            </div>
        </div>
    </div>

    <!-- Manage Presets Modal -->
    <div id="manage-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-zinc-900">Add New Preset</h3>
                <button id="close-modal" class="text-zinc-400 hover:text-zinc-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1">Label</label>
                    <input type="text" id="new-preset-label" placeholder="e.g. IFERROR" class="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all">
                    <p class="mt-1 text-[10px] text-zinc-400 italic">Use ¶ for line-break indicators</p>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1">Formula Snippet</label>
                    <textarea id="new-preset-add" placeholder="e.g. IFERROR(" class="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all h-24 resize-none font-mono text-sm"></textarea>
                </div>
                <button id="save-preset-btn" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors shadow-sm shadow-blue-200">Save Preset</button>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & State ---
        const COLUMN_COUNT = 18278; // A to ZZZ
        const ROW_COUNT = 999;
        const COLUMN_WIDTH = 100;
        const ROW_HEIGHT = 30;
        const HEADER_HEIGHT = 30;
        const ROW_HEADER_WIDTH = 40;

        const DEFAULT_PRESETS = [
            { label: '¶', add: '&char(10)&' },
            { label: '¶<br>¶', add: '&char(10)&"<br>"&char(10)&' },
            { label: '<p>¶Dimension(s):¶<br>¶', add: '"<p>"&char(10)&"<strong>Dimension(s):</strong>"&char(10)&"<br>"&char(10)&' },
            { label: '<br><br>¶Load Rating(s):¶<br>¶', add: '&char(10)&"<br><br>"&char(10)&"<strong>Load Rating(s):</strong>"&char(10)&"<br>"&char(10)&' },
            { label: '_(', add: '&" ("&' },
            { label: ')_=_', add: '&") = "&' },
        ];

        let presets = [];
        let hoveredCell = null;
        let isManageMode = false;

        // --- DOM Elements ---
        const gridContainer = document.getElementById('grid-container');
        const gridSpacer = document.getElementById('grid-spacer');
        const gridContent = document.getElementById('grid-content');
        const formulaInput = document.getElementById('formula-input');
        const presetsContainer = document.getElementById('presets-container');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const managePresetsBtn = document.getElementById('manage-presets-btn');
        const manageModal = document.getElementById('manage-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const savePresetBtn = document.getElementById('save-preset-btn');
        const newPresetLabel = document.getElementById('new-preset-label');
        const newPresetAdd = document.getElementById('new-preset-add');

        // --- Utilities ---
        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, function(m) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[m];
            });
        }

        function getColumnName(index) {
            let name = "";
            let i = index;
            while (i >= 0) {
                name = String.fromCharCode((i % 26) + 65) + name;
                i = Math.floor(i / 26) - 1;
            }
            return name;
        }

        function insertAtCursor(text) {
            const start = formulaInput.selectionStart;
            const end = formulaInput.selectionEnd;
            const val = formulaInput.value;
            formulaInput.value = val.substring(0, start) + text + val.substring(end);
            formulaInput.focus();
            const newPos = start + text.length;
            formulaInput.setSelectionRange(newPos, newPos);
        }

        // --- Rendering ---
        function renderPresets() {
            presetsContainer.innerHTML = presets.map((btn, index) => `
                <div class="preset-btn-wrapper relative group">
                    <button class="preset-btn w-full flex flex-col items-start p-3 bg-zinc-50 border border-zinc-200 rounded-lg hover:border-blue-300 hover:bg-blue-50 hover:shadow-sm transition-all text-left group" data-index="${index}">
                        <span class="text-xs font-mono text-zinc-400 mb-1 group-hover:text-blue-400"></span>
                        <span class="text-sm font-medium text-zinc-700 break-all leading-tight">
                            ${btn.label.split('¶').map((part, i, arr) => `
                                ${escapeHTML(part)}${i < arr.length - 1 ? '<span class="text-blue-500 font-bold mx-0.5">¶</span>' : ''}
                            `).join('')}
                        </span>
                        <div class="mt-2 text-[10px] text-zinc-400 font-mono truncate w-full">${escapeHTML(btn.add)}</div>
                    </button>
                    ${isManageMode ? `
                        <button class="preset-delete-btn opacity-100" data-delete-index="${index}">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    ` : ''}
                </div>
            `).join('');

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.onclick = () => {
                    const index = parseInt(btn.getAttribute('data-index'));
                    insertAtCursor(presets[index].add);
                };
            });

            if (isManageMode) {
                document.querySelectorAll('.preset-delete-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        const index = parseInt(btn.getAttribute('data-delete-index'));
                        presets.splice(index, 1);
                        savePresets();
                        renderPresets();
                        lucide.createIcons();
                    };
                });
            }
            lucide.createIcons();
        }

        function renderGrid() {
            const scrollTop = gridContainer.scrollTop;
            const scrollLeft = gridContainer.scrollLeft;
            const viewportWidth = gridContainer.clientWidth;
            const viewportHeight = gridContainer.clientHeight;

            // Calculate visible range
            const startRow = Math.max(0, Math.floor((scrollTop - HEADER_HEIGHT) / ROW_HEIGHT));
            const endRow = Math.min(ROW_COUNT - 1, Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT));
            
            const startCol = Math.max(0, Math.floor((scrollLeft - ROW_HEADER_WIDTH) / COLUMN_WIDTH));
            const endCol = Math.min(COLUMN_COUNT - 1, Math.ceil((scrollLeft + viewportWidth) / COLUMN_WIDTH));

            let html = '';

            // Render Column Headers
            for (let c = startCol; c <= endCol; c++) {
                const left = ROW_HEADER_WIDTH + c * COLUMN_WIDTH;
                const isActive = hoveredCell && hoveredCell.c === c;
                html += `<div class="header-cell ${isActive ? 'active' : ''}" style="left: ${left}px; top: ${scrollTop}px; width: ${COLUMN_WIDTH}px; height: ${HEADER_HEIGHT}px;">${getColumnName(c)}</div>`;
            }

            // Render Row Headers
            for (let r = startRow; r <= endRow; r++) {
                const top = HEADER_HEIGHT + r * ROW_HEIGHT;
                const isActive = hoveredCell && hoveredCell.r === r;
                html += `<div class="header-cell ${isActive ? 'active' : ''}" style="left: ${scrollLeft}px; top: ${top}px; width: ${ROW_HEADER_WIDTH}px; height: ${ROW_HEIGHT}px;">${r + 1}</div>`;
            }

            // Render Cells
            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    const top = HEADER_HEIGHT + r * ROW_HEIGHT;
                    const left = ROW_HEADER_WIDTH + c * COLUMN_WIDTH;
                    const isHovered = hoveredCell && hoveredCell.r === r && hoveredCell.c === c;
                    const isRowHovered = hoveredCell && hoveredCell.r === r;
                    const isColHovered = hoveredCell && hoveredCell.c === c;
                    
                    let bgClass = 'bg-white';
                    if (isHovered) bgClass = 'bg-blue-100 ring-1 ring-inset ring-blue-400 z-10';
                    else if (isRowHovered || isColHovered) bgClass = 'bg-blue-50/50';

                    html += `
                        <div class="cell ${bgClass}" 
                             style="left: ${left}px; top: ${top}px; width: ${COLUMN_WIDTH}px; height: ${ROW_HEIGHT}px;"
                             data-r="${r}" data-c="${c}">
                        </div>`;
                }
            }

            gridContent.innerHTML = html;
        }

        // --- Event Listeners ---
        gridContainer.onscroll = () => {
            requestAnimationFrame(renderGrid);
        };

        gridContent.onclick = (e) => {
            const cell = e.target.closest('.cell');
            if (cell) {
                const r = parseInt(cell.getAttribute('data-r'));
                const c = parseInt(cell.getAttribute('data-c'));
                const ref = getColumnName(c) + (r + 1);
                insertAtCursor(ref);
            }
        };

        gridContent.onmousemove = (e) => {
            const cell = e.target.closest('.cell');
            if (cell) {
                const r = parseInt(cell.getAttribute('data-r'));
                const c = parseInt(cell.getAttribute('data-c'));
                if (!hoveredCell || hoveredCell.r !== r || hoveredCell.c !== c) {
                    hoveredCell = { r, c };
                    renderGrid();
                }
            } else {
                if (hoveredCell) {
                    hoveredCell = null;
                    renderGrid();
                }
            }
        };

        gridContent.onmouseleave = () => {
            hoveredCell = null;
            renderGrid();
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(formulaInput.value);
            // Simple feedback
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-emerald-500"></i>';
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
                lucide.createIcons();
            }, 2000);
        };

        clearBtn.onclick = () => {
            formulaInput.value = '';
            formulaInput.focus();
        };

        managePresetsBtn.onclick = () => {
            isManageMode = !isManageMode;
            managePresetsBtn.textContent = isManageMode ? 'Done' : 'Manage';
            managePresetsBtn.classList.toggle('text-blue-600', !isManageMode);
            managePresetsBtn.classList.toggle('text-zinc-600', isManageMode);
            
            if (isManageMode) {
                manageModal.style.display = 'flex';
            }
            renderPresets();
        };

        closeModalBtn.onclick = () => {
            manageModal.style.display = 'none';
        };

        savePresetBtn.onclick = () => {
            const label = newPresetLabel.value.trim();
            const add = newPresetAdd.value.trim();
            
            if (label && add) {
                presets.push({ label, add });
                savePresets();
                renderPresets();
                newPresetLabel.value = '';
                newPresetAdd.value = '';
                manageModal.style.display = 'none';
            }
        };

        window.onclick = (e) => {
            if (e.target === manageModal) {
                manageModal.style.display = 'none';
            }
        };

        function savePresets() {
            localStorage.setItem('excel_formula_presets', JSON.stringify(presets));
        }

        function loadPresets() {
            const saved = localStorage.getItem('excel_formula_presets');
            if (saved) {
                presets = JSON.parse(saved);
            } else {
                presets = [...DEFAULT_PRESETS];
            }
        }

        // --- Initialization ---
        function init() {
            // Set spacer size
            gridSpacer.style.width = (ROW_HEADER_WIDTH + COLUMN_COUNT * COLUMN_WIDTH) + 'px';
            gridSpacer.style.height = (HEADER_HEIGHT + ROW_COUNT * ROW_HEIGHT) + 'px';

            loadPresets();
            renderPresets();
            renderGrid();
            lucide.createIcons();
        }

        init();

        // Handle window resize
        window.onresize = renderGrid;
    </script>
</body>
</html>
